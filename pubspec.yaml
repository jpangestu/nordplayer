name: nordplayer
description: "A highly customizable music player with extensive theming."
publish_to: "none"
version: 0.1.8-alpha+1

environment:
  sdk: ^3.10.4

dependencies:
  path: ^1.9.1
  watcher: ^1.2.1

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.1.0
  flutter_svg: ^2.2.4
  go_router: ^17.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2

  # Third parties
  audio_service: ^0.18.18
  audio_service_mpris: ^0.2.0
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  flutter_riverpod: ^3.2.1
  logger: ^2.6.2
  lucide_icons_flutter: ^3.1.12
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7
  metadata_god: ^1.1.0
  package_info_plus: ^9.0.1
  riverpod_lint: ^3.1.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.11.1

  # Third parties
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/window_control/breeze/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter_24pt-Regular.ttf
        - asset: assets/fonts/Inter/Inter_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter_24pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter_24pt-Bold.ttf
          weight: 700

    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrains_Mono/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrains_Mono/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrains_Mono/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrains_Mono/JetBrainsMono-Bold.ttf
          weight: 700

    - family: Lora
      fonts:
        - asset: assets/fonts/Lora/Lora-Regular.ttf
        - asset: assets/fonts/Lora/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora/Lora-Bold.ttf
          weight: 700

    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit/Outfit-Bold.ttf
          weight: 700

    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rubik/Rubik-Bold.ttf
          weight: 700
